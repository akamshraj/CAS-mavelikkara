<!DOCTYPE html>
<html>
<head>
    <title>Departments</title>

    <style>

        body{
            font-family: Arial;
            background: #f2f2f2;
        }

        .container{
            width: 90%;
            margin: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 40px;
        }

        .card{
            width: 300px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.2);
        }

        .card img{
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .card-body{
            padding: 15px;
        }

        .card-title{
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .card-text{
            color: #555;
        }

    </style>

</head>

<body>

    <div class="container">

        {% for hod in hods %}

        <div class="card">

            <img src="{{ hod.photo.url }}">

            <div class="card-body">

                <div class="card-title">
                    {{ hod.department.name }}
                </div>

                <div class="card-text">
                    {{ dept.detailss }}
                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</body>
</html>
